name: Build

on:
  push:
    branches: [main]
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main]

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          path: neampmod-the-tweed

      - name: Checkout engine mirror
        uses: actions/checkout@v6
        with:
          repository: danielwray/neampmod-engine-mirror
          token: ${{ secrets.ENGINE_TOKEN }}
          persist-credentials: true
          path: neampmod-engine
          ref: 51e840d711ad08f4e4f8a322849831b5dd897ff4 # v4.1.0
          fetch-depth: 0

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: neampmod-the-tweed -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev \
            libx11-xcb-dev \
            libx11-dev \
            libgtk-3-dev

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: neampmod-the-tweed
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "Building version $VERSION"

      - name: Build
        working-directory: neampmod-the-tweed
        run: cargo run --release -p xtask -- bundle the-tweed --release

      - name: Package Linux artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: neampmod-the-tweed
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-artifacts
          tar -czf "release-artifacts/neampmod-the-tweed-linux-v${VERSION}.vst3.tar.gz" \
              -C target/bundled "the-tweed.vst3"
          cp target/bundled/the-tweed.clap \
             "release-artifacts/neampmod-the-tweed-linux-v${VERSION}.clap"

      - name: Upload Linux artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: neampmod-the-tweed/release-artifacts/
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          path: neampmod-the-tweed

      - name: Checkout engine mirror
        uses: actions/checkout@v6
        with:
          repository: danielwray/neampmod-engine-mirror
          token: ${{ secrets.ENGINE_TOKEN }}
          persist-credentials: true
          path: neampmod-engine
          ref: 51e840d711ad08f4e4f8a322849831b5dd897ff4 # v4.1.0
          fetch-depth: 0

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: neampmod-the-tweed -> target

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: neampmod-the-tweed
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "Building version $VERSION"

      - name: Build
        shell: bash
        working-directory: neampmod-the-tweed
        run: cargo run --release -p xtask -- bundle the-tweed --release

      - name: Package Windows artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: neampmod-the-tweed
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-artifacts
          cp "target/bundled/the-tweed.vst3/Contents/x86_64-win/the-tweed.vst3" \
             "release-artifacts/neampmod-the-tweed-win-v${VERSION}.vst3"
          cp "target/bundled/the-tweed.clap" \
             "release-artifacts/neampmod-the-tweed-win-v${VERSION}.clap"

      - name: Upload Windows artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: neampmod-the-tweed/release-artifacts/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          path: neampmod-the-tweed

      - name: Checkout engine mirror
        uses: actions/checkout@v6
        with:
          repository: danielwray/neampmod-engine-mirror
          token: ${{ secrets.ENGINE_TOKEN }}
          persist-credentials: true
          path: neampmod-engine
          ref: 51e840d711ad08f4e4f8a322849831b5dd897ff4 # v4.1.0
          fetch-depth: 0

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92'
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: neampmod-the-tweed -> target

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: neampmod-the-tweed
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "Building version $VERSION"

      - name: Build universal binary
        working-directory: neampmod-the-tweed
        run: cargo run --release -p xtask -- bundle-universal the-tweed --release

      - name: Package macOS artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: neampmod-the-tweed
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-artifacts
          ditto -c -k --sequesterRsrc target/bundled/the-tweed.vst3 \
              "release-artifacts/neampmod-the-tweed-mac-v${VERSION}.vst3.zip"
          ditto -c -k --sequesterRsrc target/bundled/the-tweed.clap \
              "release-artifacts/neampmod-the-tweed-mac-v${VERSION}.clap.zip"

      - name: Upload macOS artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: neampmod-the-tweed/release-artifacts/
          retention-days: 7

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Tweed ${{ github.ref_name }}"
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
